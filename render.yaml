services:
  - type: web
    name: otakuzone
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: otakuzone-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
databases:
  - name: otakuzone-db
    databaseName: otakuzone
    user: otakuzone_user
